<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Recensione - Hotel Grand Luxury</title>
    <link rel="stylesheet" th:href="@{/css/recensioni/modifica_recensione.css}">
</head>
<body>

    <div class="page-container">
        
        <div class="top-nav">
            <a href="javascript:history.back()" class="btn-outline">&larr; Annulla Modifica</a>
        </div>

        <div class="section-card">
            <h2>Modifica la tua recensione</h2>

            <form th:action="@{/area-personale/recensioni/{id}/modifica(id=${id})}"
                  th:object="${modificaRecensioneDto}" 
                  method="POST">
                
                <div class="rating-container">
                    <div class="star-rating">
                        <input type="radio" id="star5" name="numeroStelle" th:value="5" th:checked="*{numeroStelle == 5}" required />
                        <label for="star5" title="5 stelle">&#9733;</label>
                        
                        <input type="radio" id="star4" name="numeroStelle" th:value="4" th:checked="*{numeroStelle == 4}" />
                        <label for="star4" title="4 stelle">&#9733;</label>
                        
                        <input type="radio" id="star3" name="numeroStelle" th:value="3" th:checked="*{numeroStelle == 3}" />
                        <label for="star3" title="3 stelle">&#9733;</label>
                        
                        <input type="radio" id="star2" name="numeroStelle" th:value="2" th:checked="*{numeroStelle == 2}" />
                        <label for="star2" title="2 stelle">&#9733;</label>
                        
                        <input type="radio" id="star1" name="numeroStelle" th:value="1" th:checked="*{numeroStelle == 1}" />
                        <label for="star1" title="1 stella">&#9733;</label>
                    </div>
                    <div class="error-message" th:if="${#fields.hasErrors('numeroStelle')}" th:errors="*{numeroStelle}"></div>
                </div>

                <div class="form-group">
                    <label for="testo">Il tuo commento:</label>
                    <textarea id="testo" th:field="*{testo}" placeholder="Aggiorna la tua esperienza..."></textarea>
                    
                    <div class="error-message" th:if="${#fields.hasErrors('testo')}" th:errors="*{testo}"></div>
                </div>

                <button type="submit" class="btn-submit">Salva Modifiche</button>

            </form>
        </div>

    </div>

    <div class="page-footer">
        <p>&copy; 2026 Hotel Grand Luxury - Prenotazioni Online</p>
    </div>

</body>
</html>
