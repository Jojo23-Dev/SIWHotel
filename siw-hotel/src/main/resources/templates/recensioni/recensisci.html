<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lascia una Recensione - Hotel Grand Luxury</title>
    <link rel="stylesheet" th:href="@{/css/recensioni/recensisci.css}">
</head>
<body>

    <div class="page-container">
        
        <div class="top-nav">
            <a class="btn-outline" th:href="@{/area-personale/prenotazioni/{id}(id=${prenotazione.idPrenotazione})}">&larr; Annulla e torna alla prenotazione</a>
        </div>

        <div class="section-card">
            <h2>Valuta il tuo soggiorno</h2>
            <p class="subtitle" th:text="'Prenotazione #' + ${prenotazione.idPrenotazione} + ' - ' + ${prenotazione.camera.tipo}"></p>

            <form th:action="@{/area-personale/prenotazioni/{idPrenotazione}/recensisci(idPrenotazione=${prenotazione.idPrenotazione})}" 
                  th:object="${recensione}" 
                  method="POST">
                
                <div class="rating-container">
                    <div class="star-rating">
                        
                        <input type="radio" id="star5" name="numeroStelle" value="5" 
                            th:checked="${recensione.numeroStelle == 5}" required />
                        <label for="star5" title="5 stelle">&#9733;</label>
                        
                        <input type="radio" id="star4" name="numeroStelle" value="4" 
                            th:checked="${recensione.numeroStelle == 4}" />
                        <label for="star4" title="4 stelle">&#9733;</label>
                        
                        <input type="radio" id="star3" name="numeroStelle" value="3" 
                            th:checked="${recensione.numeroStelle == 3}" />
                        <label for="star3" title="3 stelle">&#9733;</label>
                        
                        <input type="radio" id="star2" name="numeroStelle" value="2" 
                            th:checked="${recensione.numeroStelle == 2}" />
                        <label for="star2" title="2 stelle">&#9733;</label>
                        
                        <input type="radio" id="star1" name="numeroStelle" value="1" 
                            th:checked="${recensione.numeroStelle == 1}" />
                        <label for="star1" title="1 stella">&#9733;</label>
                        
                    </div>
                </div>

                <div class="form-group">
                    <label for="testo">Racconta la tua esperienza (opzionale):</label>
                    <textarea id="testo" th:field="*{testo}" placeholder="La camera era pulita? Lo staff è stato gentile?"></textarea>
                </div>

                <button type="submit" class="btn-submit">Pubblica Recensione</button>

            </form>
        </div>

    </div>

    <div class="page-footer">
        <p>&copy; 2026 Hotel Grand Luxury - Prenotazioni Online</p>
    </div>

</body>
</html>
