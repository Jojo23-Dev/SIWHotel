<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hotel Grand Luxury - Login</title>
    <style>
        /* Struttura base con Footer appiccicoso */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6; /* Sfondo rilassante per l'hotel */
        }

        .page-container {
            max-width: 500px; /* Più stretto perché è una pagina di login */
            margin: 60px auto;
            flex: 1;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- PULSANTE DI NAVIGAZIONE --- */
        .nav-buttons {
            display: flex;
            margin-bottom: 25px;
        }

        .btn-nav {
            padding: 10px 18px;
            text-decoration: none;
            color: #0056b3;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #0056b3;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background-color: #e6f0fa;
        }

        /* --- CARD DEL LOGIN --- */
        .login-card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border: 1px solid #e1e4e8;
        }

        .login-card h2 {
            margin: 0 0 25px 0;
            color: #002244;
            text-align: center;
            font-size: 28px;
        }

        /* --- ERRORI DI LOGIN (SPRING SECURITY) --- */
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
            font-size: 14px;
            text-align: center;
        }

        /* --- MESSAGGIO DI LOGOUT --- */
        .logout-message {
            background-color: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            font-size: 14px;
            text-align: center;
        }

        /* --- FORM ELEMENTI --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .form-group input:focus {
            border-color: #0056b3;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 86, 179, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #003b80;
        }

        /* --- LINK REGISTRAZIONE --- */
        .register-redirect {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .register-redirect a {
            color: #0056b3;
            text-decoration: none;
            font-weight: bold;
        }

        .register-redirect a:hover {
            text-decoration: underline;
        }

        /* --- FOOTER --- */
        .page-footer {
            background-color: #002244;
            height: 80px;
            width: 100%;
            margin-top: auto;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <div class="nav-buttons">
            <a class="btn-nav" th:href="@{/}">&larr; Torna alla HomePage</a>
        </div>

        <div class="login-card">
            <h2>Accedi all'Hotel</h2>

            <div th:if="${param.error}" class="error-message">
                Username o password non validi. Riprova.
            </div>

            <div th:if="${param.logout}" class="logout-message">
                Sei stato disconnesso con successo.
            </div>

            <form th:action="@{/login}" method="POST">
                
                <div class="form-group">
                    <label th:for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Inserisci il tuo username" autofocus/>
                </div>

                <div class="form-group">
                    <label th:for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Inserisci la tua password"/>
                </div>

                <button type="submit" class="btn-submit">Accedi</button>
            </form>

            <div class="register-redirect">
                Non hai ancora un profilo? <a th:href="@{/register}">Registrati</a>
            </div>
        </div>

    </div>

    <div class="page-footer">
        <p>&copy; 2026 Hotel Grand Luxury - Prenotazioni Online</p>
    </div>

</body>
</html>
