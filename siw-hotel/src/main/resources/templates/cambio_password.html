<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hotel Grand Luxury - Cambia Password</title>
    <style>
        /* (Incolla qui tutto il blocco <style> che hai già usato in "modifica-profilo.html") */
        body { margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; }
        .page-container { max-width: 500px; margin: 40px auto; flex: 1; width: 100%; padding: 20px; box-sizing: border-box; }
        .nav-buttons { display: flex; margin-bottom: 25px; }
        .btn-nav { padding: 10px 18px; text-decoration: none; color: #0056b3; background-color: #ffffff; border-radius: 8px; border: 1px solid #0056b3; font-weight: bold; transition: 0.2s; }
        .btn-nav:hover { background-color: #e6f0fa; }
        .profile-card { background-color: #ffffff; border-radius: 12px; padding: 35px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); border: 1px solid #e1e4e8; }
        .profile-card h2 { margin: 0 0 10px 0; color: #002244; text-align: center; font-size: 28px; }
        .error-message { background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #f5c6cb; font-size: 14px; text-align: center; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .form-group input:focus { border-color: #0056b3; outline: none; box-shadow: 0 0 5px rgba(0, 86, 179, 0.2); }
        .btn-submit { width: 100%; padding: 14px; background-color: #002244; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-submit:hover { background-color: #003b80; }
        .page-footer { background-color: #002244; height: 80px; width: 100%; margin-top: auto; color: white; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="page-container">
        
        <div class="nav-buttons">
            <a class="btn-nav" th:href="@{/area-personale}">&larr; Indietro</a>
        </div>

        <div class="profile-card">
            <h2>Cambio Password</h2>
            
            <div th:if="${errore}" class="error-message" th:text="${errore}"></div>

            <form th:action="@{/profilo/cambio-password}" th:object="${cambioPasswordDto}" method="POST">
                
                <div class="form-group" style="margin-bottom: 30px;">
                    <label th:for="vecchiaPassword">Password Attuale</label>
                    <input type="password" th:field="*{passwordVecchia}" required placeholder="Inserisci la password attuale" autofocus/>
                </div>

                <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

                <div class="form-group">
                    <label th:for="nuovaPassword">Nuova Password</label>
                    <input type="password" th:field="*{passwordNuova}" required placeholder="Crea una nuova password"/>
                </div>

                <div class="form-group">
                    <label th:for="confermaNuovaPassword">Conferma Nuova Password</label>
                    <input type="password" th:field="*{confermaPasswordNuova}" required placeholder="Ripeti la nuova password"/>
                </div>

                <button type="submit" class="btn-submit">Aggiorna Password</button>
            </form>

        </div>
    </div>

    <div class="page-footer">
        <p>&copy; 2026 Hotel Grand Luxury - Area Sicurezza</p>
    </div>

</body>
</html>
