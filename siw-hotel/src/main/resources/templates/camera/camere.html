<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Elenco Camere</title>
    <link rel="stylesheet" th:href="@{/css/camera/camere.css}">
</head>
<body>

<div class="page-container">
    
    <div class="top-bar">
        <a th:href="@{/}" class="back-link">&larr; Torna alla home</a>
        
        <!-- Tasto visibile SOLO all'amministratore -->
        <div sec:authorize="hasAuthority('ADMIN_ROLE')">
            <a th:href="@{/admin/camere/aggiungi}" class="btn btn-add">+ Aggiungi Camera</a>
        </div>
    </div>

    <h1>Elenco Camere</h1>

    <div th:if="${camere.isEmpty()}">
        <p style="text-align: center; color: #666;">Non ci sono camere disponibili al momento.</p>
    </div>

    <div class="camere-grid" th:unless="${camere.isEmpty()}">
        
        <div class="camera-card" th:each="camera : ${camere}">
            
            <!-- Il titolo funge da link che copre tutta la card grazie al CSS -->
            <a th:href="@{'/camere/' + ${camera.id}}" class="card-link" th:text="${camera.tipo}">Nome Camera</a>
            
            <p style="margin: 5px 0;">Tipologia: <span th:text="${camera.tipo}">Standard</span></p>
            <p style="margin: 5px 0;">Persone: <span th:text="${camera.persone}">1</span></p>
            
            <!-- Area comandi visibile SOLO all'amministratore -->
            <div class="card-actions" sec:authorize="hasAuthority('ADMIN_ROLE')">
    
                <a th:href="@{/admin/camere/{id}/modifica(id=${camera.id})}" class="btn btn-warning">Modifica</a>
    
                <form th:action="@{/admin/camere/{id}/elimina(id=${camera.id})}" method="POST" style="margin: 0; flex: 1;"
                    onsubmit="return confirm('Sei sicuro di voler eliminare questa camera?');">
                    <button type="submit" class="btn btn-danger">Elimina</button>
                </form>
    
</div>
            
        </div>

    </div>

    <div class="pagination-bar" th:if="${totalePagine > 1}">
        <a th:each="p : ${#numbers.sequence(1, totalePagine)}"
           th:href="@{/camere(pagina=${p})}"
           th:text="${(p - 1) * 10 + 1} + '-' + ${p * 10 <= totaleElementi ? p * 10 : totaleElementi}"
           th:classappend="${p == paginaCorrente} ? ' attiva' : ''"
           class="page-link">1-10</a>
    </div>
</div>

<div class="page-footer">
    <p>&copy; 2026 Hotel Grand Luxury. Tutti i diritti riservati.</p>
</div>

</body>
</html>
