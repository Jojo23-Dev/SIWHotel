<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hotel Grand Luxury - Gestione Prenotazioni</title>
    <link rel="stylesheet" th:href="@{/css/admin/prenotazioni.css}">
</head>
<body>

    <div class="page-container">
        
        <div class="top-nav">
            <a class="btn-outline" th:href="@{/admin/dashboard}">&larr; Torna alla Dashboard</a>
        </div>

        <h1 class="page-title">Tutte le Prenotazioni (Admin)</h1>

        <!-- Messaggi di sistema -->
        <div th:if="${messaggioSuccesso}" style="background-color: #d4edda; color: #155724; padding: 15px; border-radius: 8px; border: 1px solid #c3e6cb; margin-bottom: 25px;" th:text="${messaggioSuccesso}"></div>
        <div th:if="${errore}" style="background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; border: 1px solid #f5c6cb; margin-bottom: 25px;" th:text="${errore}"></div>

        <div class="section-card">
            <p th:if="${#lists.isEmpty(prenotazioni)}" style="color: #777777; font-style: italic; text-align: center;">Nessuna prenotazione presente a sistema.</p>

            <div class="table-responsive" th:unless="${#lists.isEmpty(prenotazioni)}">
                <table>
                    <thead>
                        <tr>
                            <th>Rif.</th>
                            <th>Cliente</th>
                            <th>Camera</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Importo</th>
                            <th>Note</th>
                            <th>Modifica</th>
                            <th>Azioni Override</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="prenotazione : ${prenotazioni}">
                            <td th:text="${'#' + prenotazione.idPrenotazione}">#1001</td>
                            <td th:text="${prenotazione.cliente.nome + ' ' + prenotazione.cliente.cognome}">Mario Rossi</td>
                            <td th:text="${prenotazione.camera.tipo}">Doppia Standard</td>
                            <td th:text="${#temporals.format(prenotazione.dataCheckIn, 'dd/MM/yyyy')}">10/08/2026</td>
                            <td th:text="${#temporals.format(prenotazione.dataCheckOut, 'dd/MM/yyyy')}">15/08/2026</td>
                            <td th:text="${#numbers.formatDecimal(prenotazione.prezzoTotale, 1, 'COMMA', 2, 'POINT')} + ' €'">150,00 €</td>
                            <td th:text="${prenotazione.note}"></td>
                            <td>
                                <form th:action="@{/admin/prenotazioni/{id}/modifica(id=${prenotazione.idPrenotazione})}" method="GET" style="margin: 0;">
                                    <button type="submit" class="btn-action">Modifica</button>
                                </form>
                            </td>
                            <td>
                                <!-- L'admin usa una rotta speciale per forzare la cancellazione -->
                                <form th:action="@{/admin/prenotazioni/{id}/cancella(id=${prenotazione.idPrenotazione})}" method="POST" style="margin: 0;"
                                      onsubmit="return confirm('ADMIN OVERRIDE: Stai per forzare la cancellazione di questa prenotazione scavalcando le regole cliente. Procedere?');">
                                    <button type="submit" class="btn-action btn-danger">Forza Annullamento</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination-bar" th:if="${totalePagine > 1}">
                <a th:each="p : ${#numbers.sequence(1, totalePagine)}"
                   th:href="@{/admin/prenotazioni(pagina=${p})}"
                   th:text="${(p - 1) * 10 + 1} + '-' + ${p * 10 <= totaleElementi ? p * 10 : totaleElementi}"
                   th:classappend="${p == paginaCorrente} ? ' attiva' : ''"
                   class="page-link">1-10</a>
            </div>
        </div>

    </div>

    <div class="page-footer">
        <p>&copy; 2026 Hotel Grand Luxury - Sistema Gestionale</p>
    </div>

</body>
</html>
