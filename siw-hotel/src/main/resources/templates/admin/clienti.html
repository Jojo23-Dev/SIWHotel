<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hotel Grand Luxury - Anagrafica Clienti</title>
    <style>
        /* --- STILE BASE --- */
        body { margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; }
        .page-container { max-width: 1100px; margin: 40px auto; flex: 1; width: 100%; padding: 20px; box-sizing: border-box; }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-outline { padding: 10px 18px; text-decoration: none; color: #0056b3; background-color: #ffffff; border-radius: 8px; border: 1px solid #0056b3; font-weight: bold; transition: 0.2s; }
        .btn-outline:hover { background-color: #e6f0fa; }
        
        h1.page-title { color: #002244; margin-bottom: 25px; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }

        .section-card { background-color: #ffffff; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); border: 1px solid #e1e4e8; }
        
        /* --- TABELLA --- */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        th { background-color: #f8f9fa; color: #002244; font-weight: 600; white-space: nowrap; }
        tr:hover { background-color: #f1f5f9; }
        
        .badge-country { background-color: #e6f0fa; color: #0056b3; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }

        .page-footer { background-color: #002244; height: 80px; width: 100%; margin-top: auto; color: white; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="page-container">
        
        <div class="top-nav">
            <a class="btn-outline" th:href="@{/admin/dashboard}">&larr; Torna alla Dashboard</a>
        </div>

        <h1 class="page-title">Anagrafica Completa Clienti</h1>

        <div class="section-card">
            <p th:if="${#lists.isEmpty(clienti)}" style="color: #777777; font-style: italic; text-align: center;">Nessun cliente registrato al portale.</p>

            <div class="table-responsive" th:unless="${#lists.isEmpty(clienti)}">
                <table>
                    <thead>
                        <tr>
                            <th>ID Cliente</th>
                            <th>Cognome e Nome</th>
                            <th>Data Nascita</th>
                            <th>Email Contatto</th>
                            <th>Recapito Telefonico</th>
                            <th>Nazione</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Cicla su una lista passata dal controller chiamata "clienti" -->
                        <tr th:each="cliente : ${clienti}">
                            <td th:text="${'USR-' + cliente.id}">USR-1</td>
                            <td th:text="${cliente.cognome + ' ' + cliente.nome}" style="font-weight: 600;">Rossi Mario</td>
                            <td th:text="${#temporals.format(cliente.dataDiNascita, 'dd/MM/yyyy')}">01/01/1990</td>
                            <td><a th:href="'mailto:' + ${cliente.email}" th:text="${cliente.email}">mario@email.com</a></td>
                            <td th:text="${cliente.telefono}">+39 3331234567</td>
                            <td><span class="badge-country" th:text="${cliente.nazione}">IT</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div class="page-footer">
        <p>&copy; 2026 Hotel Grand Luxury - Sistema Gestionale</p>
    </div>

</body>
</html>
