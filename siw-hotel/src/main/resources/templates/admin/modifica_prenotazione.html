<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Prenotazione - Area Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/modifica_prenotazione.css}">
</head>
<body>

    <div class="page-container">
        
        <div class="top-nav">
            <a href="javascript:history.back()" class="btn-back">
                <i class="bi bi-arrow-left"></i> Annulla e torna indietro
            </a>
        </div>

        <div class="admin-card">
            <h2><i class="bi bi-pencil-square"></i> Gestione Prenotazione</h2>
            <p class="subtitle" th:text="'Modifica dei dati per la prenotazione ID #' + ${idPrenotazione}"></p>

            <form th:action="@{/admin/prenotazioni/{id}/modifica(id=${idPrenotazione})}"
                  th:object="${modificaPrenotazioneDto}"
                  method="POST">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="dataCheckIn">Data Check-In</label>
                        <input type="date" id="dataCheckIn" th:field="*{dataCheckIn}" required />
                    </div>

                    <div class="form-group">
                        <label for="dataCheckOut">Data Check-Out</label>
                        <input type="date" id="dataCheckOut" th:field="*{dataCheckOut}" required />
                    </div>

                    <div class="form-group full-width">
                        <label for="prezzoTotale">Prezzo Totale (€)</label>
                        <input type="number" id="prezzoTotale" th:field="*{prezzoTotale}" step="0.01" min="0" required />
                    </div>

                    <div class="form-group full-width">
                        <label for="note">Note dell'Amministratore / Cliente</label>
                        <textarea id="note" th:field="*{note}" placeholder="Inserisci eventuali note o richieste particolari per questa prenotazione..."></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-save">
                    <i class="bi bi-check-circle"></i> Salva Modifiche
                </button>

            </form>
        </div>

    </div>

    <div class="page-footer">
        <p>&copy; 2026 Hotel Grand Luxury - Area Amministrazione</p>
    </div>

</body>
</html>
