<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Camera - Area Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/modifica_camera.css}">
</head>
<body>

    <div class="page-container">
        
        <div class="top-nav">
            <a href="javascript:history.back()" class="btn-back">
                <i class="bi bi-arrow-left"></i> Annulla e torna indietro
            </a>
        </div>

        <div class="admin-card">
            <h2><i class="bi bi-door-open"></i> Modifica Camera</h2>
            <p class="subtitle" th:text="'Aggiorna le specifiche e le tariffe della camera ID #' + ${id}"></p>

            <form th:action="@{/admin/camere/{id}/modifica(id=${id})}"
                  th:object="${modificaCameraDto}"
                  method="POST">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="tipo">Tipologia Camera</label>
                        <input type="text" id="tipo" th:field="*{tipo}" placeholder="Es: Suite, Doppia, Singola..." required />
                    </div>

                    <div class="form-group">
                        <label for="prezzo">Prezzo a notte (€)</label>
                        <input type="number" id="prezzo" th:field="*{prezzo}" step="0.01" min="0" placeholder="Es: 120.00" required />
                    </div>

                    <div class="form-group">
                        <label for="dimensione">Dimensione (mq)</label>
                        <input type="number" id="dimensione" th:field="*{dimensione}" min="1" placeholder="Es: 35" required />
                    </div>

                    <div class="form-group">
                        <label for="letti">Numero Letti</label>
                        <input type="number" id="letti" th:field="*{letti}" min="1" placeholder="Es: 2" required />
                    </div>

                    <div class="form-group full-width">
                        <label for="persone">Numero Massimo Ospiti</label>
                        <input type="number" id="persone" th:field="*{persone}" min="1" placeholder="Es: 3" required />
                    </div>

                    <div class="form-group full-width">
                        <label for="descrizione">Descrizione della Camera</label>
                        <textarea id="descrizione" th:field="*{descrizione}" placeholder="Fornisci dettagli sui comfort della camera (Wi-Fi, vista mare, balcone, ecc...)" required></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-save">
                    <i class="bi bi-save"></i> Aggiorna Camera
                </button>

            </form>
        </div>

    </div>

    <div class="page-footer">
        <p>&copy; 2026 Hotel Grand Luxury - Area Amministrazione</p>
    </div>

</body>
</html>
