<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hotel Grand Luxury - Cambia Password</title>
    <link rel="stylesheet" th:href="@{/css/auth/cambio_password.css}">
</head>
<body>

    <div class="page-container">
        
        <div class="nav-buttons">
            <a class="btn-nav" th:href="@{/area-personale}">&larr; Indietro</a>
        </div>

        <div class="profile-card">
            <h2>Cambio Password</h2>
            
            <div th:if="${errore}" class="error-message" th:text="${errore}"></div>

            <form th:action="@{/profilo/cambio-password}" th:object="${cambioPasswordDto}" method="POST">
                
                <div class="form-group" style="margin-bottom: 30px;">
                    <label th:for="vecchiaPassword">Password Attuale</label>
                    <input type="password" th:field="*{passwordVecchia}" required placeholder="Inserisci la password attuale" autofocus/>
                </div>

                <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

                <div class="form-group">
                    <label th:for="nuovaPassword">Nuova Password</label>
                    <input type="password" th:field="*{passwordNuova}" required placeholder="Crea una nuova password"/>
                </div>

                <div class="form-group">
                    <label th:for="confermaNuovaPassword">Conferma Nuova Password</label>
                    <input type="password" th:field="*{confermaPasswordNuova}" required placeholder="Ripeti la nuova password"/>
                </div>

                <button type="submit" class="btn-submit">Aggiorna Password</button>
            </form>

        </div>
    </div>

    <div class="page-footer">
        <p>&copy; 2026 Hotel Grand Luxury - Area Sicurezza</p>
    </div>

</body>
</html>
